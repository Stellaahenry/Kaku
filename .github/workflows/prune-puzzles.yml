name: Prune Old Puzzles

on:
  schedule:
    # 06:00 UTC on the 1st of every month — keeps only the current + next month's puzzles
    - cron: "0 6 1 * *"
  workflow_dispatch:

jobs:
  prune:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prune puzzles before the current month
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: python -m api.scripts.prune_old_puzzles
