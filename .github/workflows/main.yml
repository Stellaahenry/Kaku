name: Generate monthly puzzles

on:
  schedule:
    - cron: "0 0 25 * *"
  workflow_dispatch:
    inputs:
      year:
        description: "Year to generate, e.g. 2026"
        required: false
        type: string
      month:
        description: "Month to generate, 1-12"
        required: false
        type: string

jobs:
  generate-monthly-puzzles:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install supabase

      - name: Determine target month
        id: target
        run: |
          if [ -n "${{ github.event.inputs.year }}" ] && [ -n
          "${{ github.event.inputs.month }}" ]; then
            echo "year=${{ github.event.inputs.year }}" >> "$GITHUB_OUTPUT"
            echo "month=${{ github.event.inputs.month }}" >> "$GITHUB_OUTPUT"
          else
            echo "year=$(date -u -d 'next month' +'%Y')" >> "$GITHUB_OUTPUT"
            echo "month=$(date -u -d 'next month' +'%-m')" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate and store puzzles
        run: |
          python -m api.scripts.generate_monthly_puzzles --year
          "${{ steps.target.outputs.year }}" --month "${{ steps.target.outputs.month }}"
